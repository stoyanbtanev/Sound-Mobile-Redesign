<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sound Mobile | Production Gallery</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://api.fontshare.com">
    <link href="https://api.fontshare.com/v2/css?f[]=zodiak@400,700&f[]=satoshi@400,500,700&display=swap" rel="stylesheet">
    <style>
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            padding: 8vw;
        }
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: var(--radius-md);
            aspect-ratio: 4/3;
            cursor: pointer;
        }
        .gallery-item img {
            width: 100%; height: 100%; object-fit: cover;
            transition: var(--transition);
        }
        .gallery-item:hover img { transform: scale(1.05); }

        /* Lightbox */
        .lightbox {
          position: fixed;
          top: 0; left: 0; width: 100%; height: 100%;
          background: rgba(12, 11, 10, 0.98);
          z-index: 2000;
          display: none;
          align-items: center; justify-content: center;
          opacity: 0; transition: opacity 250ms ease;
        }
        .lightbox.active { display: flex; opacity: 1; }
        .lightbox-content { position: relative; max-width: 90vw; max-height: 80vh; }
        .lightbox-img { max-width: 100%; max-height: 80vh; object-fit: contain; }
        .lightbox-close { position: absolute; top: -3rem; right: 0; color: #fff; font-size: 2.5rem; }
    </style>
</head>

        </aside>

        <!-- Content Area -->

            </section>

            <!-- Gallery Grid -->
            <div class="gallery-grid" id="gallery-grid">
                <!-- JS will populate -->
            </div>
        </main>
    </div>

    <!-- Lightbox -->
    <div id="lightbox" class="lightbox">
        <div class="lightbox-content">
            <button class="lightbox-close">×</button>
            <img src="" alt="" class="lightbox-img" id="lightbox-img">
        </div>
    </div>

    <script src="main.js"></script>
    <script>

        ];

        galleryFiles.forEach(fileName => {
            const div = document.createElement('div');
            div.className = 'gallery-item reveal';
            div.innerHTML = `<img src="assets/gallery/${fileName}" alt="Sound Mobile Production" loading="lazy">`;
            div.onclick = () => {
                const lb = document.getElementById('lightbox');
                const lbImg = document.getElementById('lightbox-img');
                lbImg.src = `assets/gallery/${fileName}`;
                lb.classList.add('active');

            grid.appendChild(div);
        });

        document.querySelector('.lightbox-close').onclick = () => {
            document.getElementById('lightbox').classList.remove('active');
        };
    </script>
</body>
</html>
